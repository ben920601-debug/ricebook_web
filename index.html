<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯糰小幫手 ｜ 財務與揪團管理後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased pb-24 min-h-screen flex flex-col">

    <div id="confirm-gateway" class="fixed inset-0 bg-[#0A1128] z-50 flex flex-col items-center justify-center px-6">
        <div class="w-full max-w-md bg-[#1C2541] rounded-2xl p-6 border border-white/10 space-y-5 shadow-2xl">
            <div class="text-center border-b border-white/5 pb-3">
                <h2 class="text-base font-bold tracking-wider">🔐 進入帳本權核對</h2>
            </div>
            
            <div id="sdk-loading-banner" class="bg-blue-500/10 text-blue-400 text-[11px] py-2 px-3 rounded-xl border border-blue-500/20 text-center font-medium tracking-wide">
                ⏳ 正在與 LINE 安全防護通道建立聯接...
            </div>

            <div class="space-y-2">
                <label class="text-[10px] text-white/40 block tracking-wider uppercase">👤 當前登入成員</label>
                <div class="flex items-center gap-3 bg-[#0A1128] p-3 rounded-xl border border-white/5">
                    <span id="confirm-avatar" class="w-8 h-8 rounded-full bg-white/10 bg-cover bg-center"></span>
                    <span id="confirm-name" class="text-xs font-bold">LINE 驗證中...</span>
                </div>
            </div>
            
            <div class="space-y-2">
                <label class="text-[10px] text-white/40 block tracking-wider uppercase">📊 目標帳本模式</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setConfirmMode(false)" id="btn-mode-user" class="py-2.5 rounded-xl text-xs font-bold border border-white/10 transition cursor-pointer">👤 個人帳本</button>
                    <button onclick="setConfirmMode(true)" id="btn-mode-group" class="py-2.5 rounded-xl text-xs font-bold border border-white/10 transition cursor-pointer">👥 群組公帳</button>
                </div>
                <div id="group-input-box" class="space-y-1.5 pt-1 hidden">
                    <input type="text" id="input-group-id" placeholder="請確認或貼上 LINE 群組 ID..." class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white font-mono focus:outline-none">
                </div>
            </div>
            
            <button onclick="finalizeEntry()" id="btn-submit-gateway" class="w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3.5 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase">🚀 進入雲端帳本後台</button>
        </div>
    </div>

    <header class="bg-[#000411]/40 backdrop-blur-md text-white/90 py-4 px-6 border-b border-white/5 sticky top-0 z-30 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <span id="user-avatar" class="w-6 h-6 rounded-full bg-white/10 bg-cover bg-center"></span>
            <span id="user-name" class="text-xs font-bold tracking-wider">載入中...</span>
            <span id="mode-badge" class="text-[9px] bg-white/10 text-white/70 px-2 py-0.5 rounded-full font-medium tracking-wider">個人模式</span>
        </div>
        <span class="text-[9px] text-white/30 tracking-widest uppercase font-semibold">Rice Cooker Tech</span>
    </header>

    <div class="flex-1 w-full mx-auto">
        
        <main id="page-home" class="max-w-md mx-auto px-6 py-6 space-y-6">
            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5 relative overflow-hidden">
                <h2 id="balance-title" class="text-[11px] text-white/50 font-medium tracking-widest uppercase">本月收支結餘</h2>
                <div id="home-net-balance" class="text-3xl font-bold mt-1 tracking-tight font-mono">$0</div>
                <div id="home-totals-row" class="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-white/10">
                    <div>
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">總收入</span>
                        <span id="home-total-income" class="text-base font-bold text-white font-mono">+$0</span>
                    </div>
                    <div>
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">總支出</span>
                        <span id="home-total-expense" class="text-base font-medium text-white/70 font-mono">-$0</span>
                    </div>
                </div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">📊 當月支出類型比例</h3>
                <div class="w-full max-w-[200px] mx-auto"><canvas id="homeExpenseChart"></canvas></div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">📝 當月消費明細管理 (可修正/刪除)</h3>
                <div id="home-loading-text" class="text-center py-4 text-white/30 text-xs hidden">正在加載明細...</div>
                <div id="home-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>

        <main id="page-settle" class="max-w-md mx-auto px-6 py-6 space-y-6 hidden">
            <section id="group-payer-card" class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5 space-y-4 hidden">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase">👥 團隊成員墊付總額比例</h3>
                <div class="w-full max-w-[180px] mx-auto"><canvas id="payerSettleChart"></canvas></div>
                <div id="payer-summary-list" class="text-xs space-y-2 border-t border-white/5 pt-3 divide-y divide-white/5"></div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">🤝 核銷平帳紀錄維護 (可修正/刪除)</h3>
                <div id="settle-loading-text" class="text-center py-6 text-white/30 text-xs text-mono">正在讀取核銷清單...</div>
                <div id="settle-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>

        <main id="page-orders" class="max-w-md mx-auto px-6 py-6 space-y-6 hidden">
            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-3">🛒 歷史揪團訂單列表</h3>
                <p class="text-[10px] text-white/40 mb-4">點擊下方訂單卡片，即可展開實時「已付/未付」成員對帳報表。</p>
                <div id="order-loading-text" class="text-center py-6 text-white/30 text-xs">正在檢索群組訂單...</div>
                <div id="order-master-list" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <footer class="fixed bottom-0 inset-x-0 bg-[#000411]/80 backdrop-blur-lg border-t border-white/5 z-30 pb-safe">
        <div id="nav-container" class="max-w-md mx-auto grid grid-cols-2 h-16">
            <button onclick="switchPage('home')" id="btn-nav-home" class="flex flex-col items-center justify-center gap-1 transition text-white"><span class="text-base">📊</span><span class="text-[10px] tracking-wider">花費紀錄</span></button>
            <button onclick="switchPage('settle')" id="btn-nav-settle" class="flex flex-col items-center justify-center gap-1 transition text-white/40"><span class="text-base">🤝</span><span class="text-[10px] tracking-wider">核銷紀錄</span></button>
            <button onclick="switchPage('orders')" id="btn-nav-orders" class="flex flex-col items-center justify-center gap-1 transition text-white/40 hidden"><span class="text-base">📋</span><span class="text-[10px] tracking-wider">訂單核銷</span></button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 已同步對齊您的專案金鑰
        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MY_LIFF_ID = "2010446205-W1G1WDQQ";

        let homeChart = null; let payerChart = null;
        let globalUserId = null; let globalProfile = { displayName: "雲端帳本主", pictureUrl: "" };
        let isGroupModeSelected = false; let finalTargetId = null;

        // ⏳ 異步防衝突機制：確保 DOM 完全渲染完畢後再喚醒 LINE SDK
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initLIFFSafeFlow, 300);
        });

        // 🚀 初始化 LINE SDK 與安全代理重試防線
        async function initLIFFSafeFlow() {
            const banner = document.getElementById("sdk-loading-banner");
            const submitBtn = document.getElementById("btn-submit-gateway");
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                
                const context = liff.getContext();
                if (context && context.userId) {
                    globalUserId = context.userId;
                }

                try {
                    const profile = await liff.getProfile();
                    if (profile) {
                        globalProfile = profile;
                        if (!globalUserId) globalUserId = profile.userId;
                    }
                } catch (pError) {
                    console.warn("getProfile 時差碰撞，啟動 Context 靜態名冊備份機制", pError);
                }

                document.getElementById("confirm-name").innerText = globalProfile.displayName || "雲端帳本負責人";
                if (globalProfile.pictureUrl) {
                    document.getElementById("confirm-avatar").style.backgroundImage = `url('${globalProfile.pictureUrl}')`;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const urlGroupId = urlParams.get('groupId');
                const urlUserId = urlParams.get('userId');

                if (urlGroupId && !urlUserId) { 
                    document.getElementById("input-group-id").value = urlGroupId; 
                    setConfirmMode(true); 
                } else { 
                    setConfirmMode(false); 
                }

                banner.innerText = "✅ LINE 安全通道對接完畢！";
                banner.className = "bg-emerald-500/10 text-emerald-400 text-[11px] py-2 px-3 rounded-xl border border-emerald-500/20 text-center font-medium tracking-wide";
                submitBtn.className = "w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3.5 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase";
                submitBtn.removeAttribute("disabled");

            } catch (error) { 
                console.error("SDK 故障，啟動安全沙包通道機制", error);
                if (!globalUserId) globalUserId = "user_" + Math.random().toString(36).substring(2, 7);
                document.getElementById("confirm-name").innerText = "雲端財務官 (安全機制放行)";
                setConfirmMode(false);

                banner.innerText = "⚡ 通道已就緒 (已啟動安全代理授權)";
                banner.className = "bg-amber-500/10 text-amber-400 text-[11px] py-2 px-3 rounded-xl border border-amber-500/20 text-center font-medium tracking-wide";
                submitBtn.className = "w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3.5 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase";
                submitBtn.removeAttribute("disabled");
            }
        }

        window.setConfirmMode = function(toGroupMode) {
            isGroupModeSelected = toGroupMode;
            const btnUser = document.getElementById("btn-mode-user"); 
            const btnGroup = document.getElementById("btn-mode-group");
            const groupInputBox = document.getElementById("group-input-box");
            
            if (toGroupMode) {
                btnGroup.className = "py-2.5 rounded-xl text-xs font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition cursor-pointer";
                btnUser.className = "py-2.5 rounded-xl text-xs font-bold bg-white/5 text-white/40 border border-white/5 transition cursor-pointer";
                groupInputBox.classList.remove("hidden");
            } else {
                btnUser.className = "py-2.5 rounded-xl text-xs font-bold bg-blue-500/20 text-blue-400 border border-blue-500/30 transition cursor-pointer";
                btnGroup.className = "py-2.5 rounded-xl text-xs font-bold bg-white/5 text-white/40 border border-white/5 transition cursor-pointer";
                groupInputBox.classList.add("hidden");
            }
        }

        window.finalizeEntry = function() {
            const inputGroupVal = document.getElementById("input-group-id").value.trim();
            const navContainer = document.getElementById("nav-container");
            const btnNavOrders = document.getElementById("btn-nav-orders");
            const url = new URL(window.location.href);

            if (isGroupModeSelected) {
                if (!inputGroupVal) { alert("請輸入群組 ID！"); return; }
                finalTargetId = inputGroupVal;
                document.getElementById("mode-badge").innerText = "👥 群組公帳模式";
                document.getElementById("mode-badge").className = "text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-medium tracking-wider";
                document.getElementById("balance-title").innerText = "本月群組總支出開銷";
                document.getElementById("user-name").innerText = `${globalProfile.displayName || '群組夥伴'} (群組成員)`;
                
                navContainer.className = "max-w-md mx-auto grid grid-cols-3 h-16";
                btnNavOrders.classList.remove("hidden");
                document.getElementById("group-payer-card").classList.remove("hidden");
                
                url.searchParams.set('groupId', finalTargetId);
                url.searchParams.delete('userId');
                window.history.replaceState({}, '', url.toString());
            } else {
                finalTargetId = globalUserId;
                document.getElementById("input-group-id").value = "";
                
                document.getElementById("mode-badge").innerText = "👤 個人私帳模式";
                document.getElementById("mode-badge").className = "text-[9px] bg-white/10 text-white/70 px-2 py-0.5 rounded-full font-medium tracking-wider";
                document.getElementById("balance-title").innerText = "本月個人收支結餘";
                document.getElementById("user-name").innerText = globalProfile.displayName || "個人帳本主";
                
                navContainer.className = "max-w-md mx-auto grid grid-cols-2 h-16";
                btnNavOrders.classList.add("hidden");
                document.getElementById("group-payer-card").classList.add("hidden");
                
                url.searchParams.delete('groupId');
                url.searchParams.set('userId', finalTargetId);
                window.history.replaceState({}, '', url.toString());
            }
            
            if (globalProfile.pictureUrl) {
                document.getElementById("user-avatar").style.backgroundImage = `url('${globalProfile.pictureUrl}')`;
            }
            document.getElementById("confirm-gateway").remove();
            loadHomeDashboard();
        }

        window.switchPage = function(pageTarget) {
            const pages = { home: 'page-home', settle: 'page-settle', orders: 'page-orders' };
            const btns = { home: 'btn-nav-home', settle: 'btn-nav-settle', orders: 'btn-nav-orders' };
            Object.keys(pages).forEach(p => {
                const elPage = document.getElementById(pages[p]);
                const elBtn = document.getElementById(btns[p]);
                if (elPage) elPage.classList.add("hidden");
                if (elBtn) elBtn.className = "flex flex-col items-center justify-center gap-1 transition text-white/40";
            });

            const targetPage = document.getElementById(pages[pageTarget]);
            const targetBtn = document.getElementById(btns[pageTarget]);
            if (targetPage) targetPage.classList.remove("hidden");
            if (targetBtn) targetBtn.className = "flex flex-col items-center justify-center gap-1 transition text-white font-semibold";

            if (pageTarget === 'home') loadHomeDashboard();
            else if (pageTarget === 'settle') loadSettleDashboard();
            else if (pageTarget === 'orders') loadOrdersDashboard();
        }

        // 🏠 PAGE 1: 花費紀錄
        async function loadHomeDashboard() {
            document.getElementById("home-loading-text").classList.remove("hidden");
            try {
                const now = new Date(); const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const rootCollection = isGroupModeSelected ? "groups" : "users";
                const expensesRef = collection(db, rootCollection, finalTargetId, "expenses");
                const q = query(expensesRef, where("timestamp", ">=", startOfMonth), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                let incomeTotal = 0, expenseTotal = 0;
                let categoryData = {}; let listHtml = "";

                querySnapshot.forEach((res) => {
                    const id = res.id; const data = res.data(); const amt = data.amount || 0;
                    const type = data.type || "expense"; const item = data.item || "未命名";
                    const cat = data.category || "生活雜費"; const payer = data.created_by_name || "未知";
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    if (type === "income") incomeTotal += amt;
                    else { expenseTotal += amt; categoryData[cat] = (categoryData[cat] || 0) + amt; }

                    listHtml += `
                        <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-full ${type==='income' ? 'bg-white text-[#0A1128]' : 'bg-white/10 text-white/80'} text-[11px] font-bold flex items-center justify-center">${type==='income'?'入':'支'}</div>
                                <div class="flex flex-col">
                                    <span class="font-medium text-white/90 tracking-wide">${item} <span class="text-[9px] text-white/30 font-normal">${isGroupModeSelected ? 'by '+payer : ''}</span></span>
                                    <span class="text-[10px] text-white/40 mt-0.5">${cat}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-right">
                                    <span class="font-bold font-mono ${type==='income' ? 'text-white' : 'text-white/60'}">${type==='income'?'+':'-'} $${amt.toLocaleString()}</span>
                                    <span class="text-white/30 block text-[9px] mt-0.5">${dateStr}</span>
                                </div>
                                <div class="flex items-center gap-1 border-l border-white/5 pl-2">
                                    <button onclick="editRecord('expenses', '${id}', '${item}', ${amt})" class="w-6 h-6 text-white/30 hover:text-white text-xs cursor-pointer">✎</button>
                                    <button onclick="deleteRecord('expenses', '${id}', '${item}')" class="w-6 h-6 text-rose-400/30 hover:text-rose-400 text-xs cursor-pointer">🗑️</button>
                                </div>
                            </div>
                        </div>`;
                });

                document.getElementById("home-loading-text").classList.add("hidden");
                document.getElementById("home-history-list").innerHTML = listHtml ? listHtml : `<div class="text-center py-6 text-white/20 text-xs">當月帳本尚無消費明細。</div>`;
                
                if (isGroupModeSelected) {
                    document.getElementById("home-net-balance").innerText = `$${expenseTotal.toLocaleString()}`;
                    document.getElementById("home-totals-row").classList.add("hidden"); 
                } else {
                    document.getElementById("home-totals-row").classList.remove("hidden");
                    document.getElementById("home-total-income").innerText = `+$${incomeTotal.toLocaleString()}`;
                    document.getElementById("home-total-expense").innerText = `-$${expenseTotal.toLocaleString()}`;
                    document.getElementById("home-net-balance").innerText = `$${(incomeTotal - expenseTotal).toLocaleString()}`;
                }
                renderDoughnutChart('homeExpenseChart', homeChart, categoryData, v => homeChart = v);
            } catch (e) { console.error(e); document.getElementById("home-loading-text").classList.add("hidden"); }
        }

        // 🤝 PAGE 2: 核銷紀錄
        async function loadSettleDashboard() {
            document.getElementById("settle-loading-text").classList.remove("hidden");
            try {
                const rootCollection = isGroupModeSelected ? "groups" : "users";
                
                if (isGroupModeSelected) {
                    const expRef = collection(db, "groups", finalTargetId, "expenses");
                    const snap = await getDocs(expRef);
                    let payerMap = {}; let totalExp = 0;
                    snap.forEach(d => {
                        const data = d.data();
                        if(data.type !== "income") {
                            const p = data.created_by_name || "未知"; const a = data.amount || 0;
                            payerMap[p] = (payerMap[p] || 0) + a; totalExp += a;
                        }
                    });
                    renderDoughnutChart('payerSettleChart', payerChart, payerMap, v => payerChart = v);
                    let summaryHtml = `<div class="font-bold text-white/40 text-[10px] pb-1">💰 成員累計墊付排行：</div>`;
                    Object.keys(payerMap).sort((a,b)=>payerMap[b]-payerMap[a]).forEach(p => {
                        summaryHtml += `<div class="flex justify-between py-1.5"><span>🟢 ${p}</span><span class="font-mono font-bold">$${payerMap[p].toLocaleString()} (${totalExp > 0 ? ((payerMap[p]/totalExp)*100).toFixed(1) : 0}%)</span></div>`;
                    });
                    document.getElementById("payer-summary-list").innerHTML = summaryHtml;
                }

                const settleRef = collection(db, rootCollection, finalTargetId, "settlements");
                const q = query(settleRef, orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                let listHtml = "";

                querySnapshot.forEach((res) => {
                    const id = res.id; const data = res.data(); const amt = data.amount || 0;
                    const p = data.payer_name || "未知"; const r = data.receiver_name || "未知";
                    const codeRef = data.order_code_ref ? `[訂單 #${data.order_code_ref}]` : '[日常平帳]';
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    listHtml += `
                        <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-full bg-emerald-500/20 text-emerald-400 font-bold text-[10px] flex items-center justify-center">平</div>
                                <div class="flex flex-col">
                                    <span class="font-medium text-white/90 tracking-wide">
                                        <span class="bg-white/10 px-1 py-0.5 rounded text-[11px]">${p}</span> 還給 <span class="bg-emerald-500/10 text-emerald-400 px-1 py-0.5 rounded text-[11px]">${r}</span>
                                    </span>
                                    <span class="text-[10px] text-white/30 mt-1.5 font-mono">${dateStr} ｜ ${codeRef}</span>
                                </div>
                            </div>
