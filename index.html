<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯糰小幫手 ｜ 自動重整流暢版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased p-6">

    <div class="max-w-md mx-auto space-y-6">
        <header class="border-b border-white/10 pb-4">
            <h1 class="text-base font-bold tracking-wider">🧪 飯糰自動對帳調試面板</h1>
            <p class="text-xs text-white/40 mt-1 font-mono" id="test-status">正在喚醒安全防護...</p>
        </header>

        <div class="bg-[#1C2541] rounded-xl p-4 border border-white/5 space-y-1">
            <div class="text-[10px] text-white/40 uppercase tracking-widest font-bold">👤 雲端對接憑證 Target ID</div>
            <div id="target-id-display" class="text-xs font-mono text-emerald-400 break-all font-bold">校驗中...</div>
        </div>

        <div class="bg-[#1C2541] rounded-xl p-4 border border-white/5 space-y-4">
            <h3 class="text-xs font-bold text-white/70 tracking-wider">📋 實時雲端花費明細</h3>
            <div id="test-loading-text" class="text-center py-4 text-white/30 text-xs font-mono">正在安全對接雲端數據...</div>
            <div id="test-history-list" class="space-y-3 divide-y divide-white/5"></div>
        </div>

        <button onclick="triggerForceRelogin()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 font-bold text-xs py-3 rounded-xl transition tracking-widest uppercase cursor-pointer">
            🚨 感覺卡住？強制清除快取並重新登入
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const MY_LIFF_ID = "2010446205-W1G1WDQQ"; 

        let finalTargetId = null;

        window.addEventListener('DOMContentLoaded', () => {
            startTestFlow();
        });

        async function startTestFlow() {
            const statusEl = document.getElementById("test-status");
            const targetEl = document.getElementById("target-id-display");

            // 1. 攔截解析網址
            const urlParams = new URLSearchParams(window.location.search);
            const urlGroupId = urlParams.get('groupId');
            const urlUserId = urlParams.get('userId');

            if (urlGroupId) { finalTargetId = urlGroupId; } 
            else if (urlUserId) { finalTargetId = urlUserId; }

            // 2. 喚醒 LINE SDK
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                // 🚀 【重整核心防線 A】如果未登入，立刻引導 LINE 登入流
                if (!liff.isLoggedIn()) {
                    console.log("偵測到未登入狀態，引導官方認證...");
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                statusEl.innerText = "✅ LINE 通道聯接完畢";

                // 3. 補齊個人識別碼
                if (!finalTargetId) {
                    const context = liff.getContext();
                    if (context && context.userId) {
                        finalTargetId = context.userId;
                    } else {
                        const profile = await liff.getProfile();
                        finalTargetId = profile.userId;
                    }
                }
                targetEl.innerText = finalTargetId;
                
                // 4. 發動 Firebase 資料拉取
                loadTestFirebaseData();

            } catch (err) {
                console.warn("LINE SDK 被沙盒死鎖，啟動自動代理放行...", err);
                statusEl.innerText = "⚠️ 觸發安全隔離機制 (已啟動代理)";
                
                if (!finalTargetId) {
                    // 🚀 【重整核心防線 B】萬一徹底沒有 ID，主動引導重整，不讓畫面空白
                    statusEl.innerText = "🔄 偵測到通訊時差，正在自動重置校驗...";
                    setTimeout(() => { triggerForceRelogin(); }, 1000);
                    return;
                }
                targetEl.innerText = finalTargetId + " (安全代理狀態)";
                loadTestFirebaseData();
            }
        }

        async function loadTestFirebaseData() {
            const loadingTxt = document.getElementById("test-loading-text");
            const listEl = document.getElementById("test-history-list");
            
            // 🚀 【重整核心防線 C】設定超時地雷：如果 3 秒內沒載入出資料，判定為 WebView 死鎖，強制刷新
            const timeoutGuard = setTimeout(() => {
                if (loadingTxt && !loadingTxt.classList.contains("hidden")) {
                    console.log("Firebase 讀取超時，強制清洗環境並重整...");
                    triggerForceRelogin();
                }
            }, 3000);

            try {
                const isGroup = finalTargetId.startsWith("C") || finalTargetId.startsWith("c") || (finalTargetId.length > 20 && !finalTargetId.startsWith("U"));
                const rootCollection = isGroup ? "groups" : "users";
                
                const expRef = collection(db, rootCollection, finalTargetId, "expenses");
                const q = query(expRef, orderBy("timestamp", "desc"), limit(10));
                const snap = await getDocs(q);

                clearTimeout(timeoutGuard); // 順利拿到資料，拆除超時重整地雷
                loadingTxt.classList.add("hidden");
                let html = "";

                if (snap.empty) {
                    listEl.innerHTML = `<div class="text-center py-4 text-white/20 text-xs font-mono">對接成功 ｜ 目前資料庫尚無紀錄。</div>`;
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    html += `
                        <div class="flex justify-between items-center pt-3 text-xs first:pt-0 font-mono">
                            <span class="text-white/90 font-bold">${d.item || "日常支出"}</span>
                            <span class="font-bold text-white/60">-$${d.amount || 0}</span>
                        </div>`;
                });
                listEl.innerHTML = html;
            } catch (e) {
                clearTimeout(timeoutGuard);
                console.error(e);
                loadingTxt.innerText = "❌ 資料庫連線被阻斷，正在重新對接中...";
                // 🚀 【重整核心防線 D】發生連線阻斷，兩秒後自動登出刷新
                setTimeout(() => { triggerForceRelogin(); }, 2000);
            }
        }

        // 🎯 萬能重置重定向函數
        window.triggerForceRelogin = function() {
            try {
                liff.logout(); // 強制踢掉過期快取
            } catch(e){}
            
            // 清乾淨網址列多餘參數，避免快取殭屍，重新乾淨載入
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.delete('groupId');
            cleanUrl.searchParams.delete('userId');
            
            window.location.replace(cleanUrl.toString());
        }
    </script>
</body>
</html>
