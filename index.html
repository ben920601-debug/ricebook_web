<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯糰小幫手 ｜ 簡易連線測試版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased p-6">

    <div class="max-w-md mx-auto space-y-6">
        <header class="border-b border-white/10 pb-4">
            <h1 class="text-base font-bold tracking-wider">🧪 飯糰簡易連線測試後台</h1>
            <p class="text-xs text-white/40 mt-1 font-mono" id="test-status">正在嘗試與 LINE SDK 握手...</p>
        </header>

        <div class="bg-[#1C2541] rounded-xl p-4 border border-white/5 space-y-1">
            <div class="text-[10px] text-white/40 uppercase tracking-widest font-bold">👤 當前資料庫讀取 Key (Target ID)</div>
            <div id="target-id-display" class="text-xs font-mono text-emerald-400 break-all select-all font-bold">載入中...</div>
        </div>

        <div class="bg-[#1C2541] rounded-xl p-4 border border-white/5 space-y-4">
            <h3 class="text-xs font-bold text-white/70 tracking-wider">📋 雲端歷史花費明細 (唯讀測試)</h3>
            <div id="test-loading-text" class="text-center py-4 text-white/30 text-xs font-mono">正在連線 Firebase Firestore...</div>
            <div id="test-history-list" class="space-y-3 divide-y divide-white/5"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 1. 補上你的 Firebase 憑證
        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        
        // 🔥 2. 補上你的 LIFF ID
        const MY_LIFF_ID = "2010446205-W1G1WDQQ";

        let finalTargetId = null;

        // 🟢 一開場直接發動平行連線，不互卡
        window.addEventListener('DOMContentLoaded', () => {
            startTestFlow();
        });

        async function startTestFlow() {
            const statusEl = document.getElementById("test-status");
            const targetEl = document.getElementById("target-id-display");

            // 🚀 第一步：優先解析網址列參數（群組優先）
            const urlParams = new URLSearchParams(window.location.search);
            const urlGroupId = urlParams.get('groupId');
            const urlUserId = urlParams.get('userId');

            if (urlGroupId) {
                finalTargetId = urlGroupId;
                targetEl.innerText = `${finalTargetId} (來自網址 groupId)`;
            } else if (urlUserId) {
                finalTargetId = urlUserId;
                targetEl.innerText = `${finalTargetId} (來自網址 userId)`;
            }

            // 🚀 第二步：嘗試初始化 LINE SDK
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                statusEl.innerText = "✅ LINE SDK 載入成功！";
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 如果網址沒帶參數，用 LINE SDK 取代個人唯一的 userId
                if (!finalTargetId) {
                    const context = liff.getContext();
                    if (context && context.userId) {
                        finalTargetId = context.userId;
                    } else {
                        const profile = await liff.getProfile();
                        finalTargetId = profile.userId;
                    }
                    targetEl.innerText = `${finalTargetId} (來自 LINE SDK 認證)`;
                }
            } catch (err) {
                // 🛡️ 內部瀏覽器沙盒過濾保底：即使失敗也絕不中斷！
                console.warn("LINE SDK 遭阻斷，啟動無痕沙盒防禦", err);
                statusEl.innerText = "⚠️ LINE SDK 遭 WebView 沙盒限制 (已啟動安全代理)";
                
                // 萬一網址沒帶參數，SDK 又失敗，隨機發放一個測試 Key，確保網頁能繼續執行
                if (!finalTargetId) {
                    finalTargetId = "test_user_fallback";
                    targetEl.innerText = `${finalTargetId} (WebView 保底測試 Key)`;
                }
            }

            // 🚀 第三步：直接進攻 Firebase 資料庫讀取測試
            loadTestFirebaseData();
        }

        async function loadTestFirebaseData() {
            const loadingTxt = document.getElementById("test-loading-text");
            const listEl = document.getElementById("test-history-list");
            
            try {
                // 自動判斷讀取個人 users 還是群組 groups
                const isGroup = finalTargetId.startsWith("C") || finalTargetId.startsWith("c") || finalTargetId.includes("fallback") === false;
                const rootCollection = isGroup ? "groups" : "users";
                
                statusEl.innerText += ` ➡️ 正在檢索 [${rootCollection}/${finalTargetId}]`; // 動態疊加日誌
                
                const expRef = collection(db, rootCollection, finalTargetId, "expenses");
                const q = query(expRef, orderBy("timestamp", "desc"), limit(10)); // 只拉最新的 10 筆明細
                const snap = await getDocs(q);

                loadingTxt.classList.add("hidden");
                let html = "";

                if (snap.empty) {
                    listEl.innerHTML = `<div class="text-center py-4 text-white/20 text-xs font-mono">連線成功，但此 ID 資料庫內尚無記帳數據。</div>`;
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    const item = d.item || "未命名";
                    const amt = d.amount || 0;
                    const type = d.type || "expense";
                    const payer = d.created_by_name || "未知";
                    
                    html += `
                        <div class="flex justify-between items-center pt-3 text-xs first:pt-0 font-mono">
                            <div class="flex flex-col">
                                <span class="text-white/90 font-bold">${item} <span class="text-[9px] text-white/30 font-normal">by ${payer}</span></span>
                            </div>
                            <span class="font-bold ${type==='income' ? 'text-emerald-400':'text-white/60'}">${type==='income'?'+':'-'} $${amt}</span>
                        </div>`;
                });

                listEl.innerHTML = html;
            } catch (e) {
                console.error("Firebase 連線挫敗:", e);
                loadingTxt.innerText = `❌ Firebase 讀取失敗\n原因: ${e.message ? e.message : e.toString()}`;
                loadingTxt.className = "text-center py-4 text-rose-400 text-xs font-mono whitespace-pre-line font-bold";
            }
        }
    </script>
</body>
</html>
