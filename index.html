<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯糰小幫手 ｜ 財務管理後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased pb-24 min-h-screen flex flex-col">

    <!-- 🔒 權内核對確認遮罩 -->
    <div id="confirm-gateway" class="fixed inset-0 bg-[#0A1128] z-50 flex flex-col items-center justify-center px-6">
        <div class="w-full max-w-md bg-[#1C2541] rounded-2xl p-6 border border-white/10 space-y-5 shadow-2xl">
            <div class="text-center border-b border-white/5 pb-3">
                <h2 class="text-base font-bold tracking-wider">🔐 進入账本權内核對</h2>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] text-white/40 block tracking-wider uppercase">👤 當前登入成員</label>
                <div class="flex items-center gap-3 bg-[#0A1128] p-3 rounded-xl border border-white/5">
                    <span id="confirm-avatar" class="w-8 h-8 rounded-full bg-white/10 bg-cover bg-center"></span>
                    <span id="confirm-name" class="text-xs font-bold">載入中...</span>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] text-white/40 block tracking-wider uppercase">📊 目標帳本模式</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setConfirmMode(false)" id="btn-mode-user" class="py-2.5 rounded-xl text-xs font-bold border border-white/10 transition cursor-pointer">👤 個人帳本</button>
                    <button onclick="setConfirmMode(true)" id="btn-mode-group" class="py-2.5 rounded-xl text-xs font-bold border border-white/10 transition cursor-pointer">👥 群組公帳</button>
                </div>
                <div id="group-input-box" class="space-y-1.5 pt-1 hidden">
                    <input type="text" id="input-group-id" placeholder="請確認或貼上 LINE 群組 ID..." class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white font-mono focus:outline-none">
                </div>
            </div>
            <button onclick="finalizeEntry()" class="w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3.5 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase">🚀 進入雲端帳本後台</button>
        </div>
    </div>

    <!-- 🌐 頂部狀態列 -->
    <header class="bg-[#000411]/40 backdrop-blur-md text-white/90 py-4 px-6 border-b border-white/5 sticky top-0 z-30 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <span id="user-avatar" class="w-6 h-6 rounded-full bg-white/10 bg-cover bg-center"></span>
            <span id="user-name" class="text-xs font-bold tracking-wider">載入中...</span>
            <span id="mode-badge" class="text-[9px] bg-white/10 text-white/70 px-2 py-0.5 rounded-full font-medium tracking-wider">個人模式</span>
        </div>
        <span class="text-[9px] text-white/30 tracking-widest uppercase font-semibold">Rice Cooker Tech</span>
    </header>

    <!-- 📦 主要內容區塊 -->
    <div class="flex-1 w-full mx-auto">
        
        <!-- 🏠 PAGE 1: 數據總覽大簡報 -->
        <main id="page-home" class="max-w-md mx-auto px-6 py-6 space-y-6">
            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5 relative overflow-hidden">
                <h2 id="balance-title" class="text-[11px] text-white/50 font-medium tracking-widest uppercase">本月收支結餘 (唯讀)</h2>
                <div id="home-net-balance" class="text-3xl font-bold mt-1 tracking-tight font-mono">$0</div>
                <div id="home-totals-row" class="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-white/10">
                    <div>
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">總收入</span>
                        <span id="home-total-income" class="text-base font-bold text-white font-mono">+$0</span>
                    </div>
                    <div class="border-l border-white/10 pl-4">
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">總支出</span>
                        <span id="home-total-expense" class="text-base font-medium text-white/70 font-mono">-$0</span>
                    </div>
                </div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 id="chart-title" class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">支出統計比例</h3>
                <div class="w-full max-w-[200px] mx-auto"><canvas id="homeExpenseChart"></canvas></div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 id="history-title" class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">📑 當月即時流水帳 (唯讀)</h3>
                <div id="home-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>

        <!-- ⚙️ PAGE 2: 進階資料管理 (個人記帳維護 / 群組核銷歷史) -->
        <main id="page-manage" class="max-w-md mx-auto px-6 py-6 space-y-6 hidden">
            <section class="bg-[#1C2541] rounded-2xl p-5 shadow-xl border border-white/5 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-white/40 block tracking-wider uppercase mb-1">起始日期</label>
                        <input type="date" id="filter-start" class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-white/40 block tracking-wider uppercase mb-1">結束日期</label>
                        <input type="date" id="filter-end" class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                    </div>
                </div>
                <button onclick="queryManagedData()" class="w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase">🔍 發動條件檢索</button>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 id="manage-box-title" class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">🛠 Im維護控制台</h3>
                <div id="manage-loading-text" class="text-center py-8 text-white/30 text-xs tracking-wider hidden">正在檢索資料庫...</div>
                <div id="manage-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>
    </div>

    <!-- 📱 底部導覽列 -->
    <footer class="fixed bottom-0 inset-x-0 bg-[#000411]/80 backdrop-blur-lg border-t border-white/5 z-30 pb-safe">
        <div class="max-w-md mx-auto grid grid-cols-2 h-16">
            <button onclick="switchPage('home')" id="btn-nav-home" class="flex flex-col items-center justify-center gap-1 transition text-white"><span class="text-base">📊</span><span id="tab-title-1" class="text-[10px] tracking-wider">數據簡報</span></button>
            <button onclick="switchPage('manage')" id="btn-nav-manage" class="flex flex-col items-center justify-center gap-1 transition text-white/40"><span class="text-base">📑</span><span id="tab-title-2" class="text-[10px] tracking-wider">進階維護</span></button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const MY_LIFF_ID = "2010446205-W1G1WDQQ"; 

        let homeChart = null; let globalUserId = null; let globalProfile = null;
        let isGroupModeSelected = false; let finalTargetId = null;

        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                globalProfile = await liff.getProfile(); globalUserId = globalProfile.userId;
                document.getElementById("confirm-name").innerText = globalProfile.displayName;
                if (globalProfile.pictureUrl) document.getElementById("confirm-avatar").style.backgroundImage = `url('${globalProfile.pictureUrl}')`;

                const urlParams = new URLSearchParams(window.location.search);
                const urlGroupId = urlParams.get('groupId');
                if (urlGroupId) { document.getElementById("input-group-id").value = urlGroupId; setConfirmMode(true); } 
                else { setConfirmMode(false); }
                document.getElementById("confirm-gateway").classList.remove("hidden");
            } catch (error) { console.error(error); }
        }

        window.setConfirmMode = function(toGroupMode) {
            isGroupModeSelected = toGroupMode;
            const btnUser = document.getElementById("btn-mode-user"); const btnGroup = document.getElementById("btn-mode-group");
            const groupInputBox = document.getElementById("group-input-box");
            if (toGroupMode) {
                btnGroup.className = "py-2.5 rounded-xl text-xs font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition cursor-pointer";
                btnUser.className = "py-2.5 rounded-xl text-xs font-bold bg-white/5 text-white/40 border border-white/5 transition cursor-pointer";
                groupInputBox.classList.remove("hidden");
            } else {
                btnUser.className = "py-2.5 rounded-xl text-xs font-bold bg-blue-500/20 text-blue-400 border border-blue-500/30 transition cursor-pointer";
                btnGroup.className = "py-2.5 rounded-xl text-xs font-bold bg-white/5 text-white/40 border border-white/5 transition cursor-pointer";
                groupInputBox.classList.add("hidden");
            }
        }

        window.finalizeEntry = function() {
            const inputGroupVal = document.getElementById("input-group-id").value.trim();
            if (isGroupModeSelected) {
                if (!inputGroupVal) { alert("請輸入群組 ID！"); return; }
                finalTargetId = inputGroupVal;
                document.getElementById("mode-badge").innerText = "👥 群組公帳模式";
                document.getElementById("mode-badge").className = "text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-medium tracking-wider";
                document.getElementById("balance-title").innerText = "本月群組總開銷公帳 (唯讀)";
                document.getElementById("chart-title").innerText = "👥 群組成員支出比例統計";
                document.getElementById("history-title").innerText = "📑 本月群組消費流水帳 (唯讀)";
                document.getElementById("tab-title-2").innerText = "核銷紀錄";
                document.getElementById("manage-box-title").innerText = "🤝 群組平帳核銷維護控制台";
                document.getElementById("user-name").innerText = `${globalProfile.displayName} (群組成員)`;
            } else {
                finalTargetId = globalUserId;
                document.getElementById("mode-badge").innerText = "👤 個人私帳模式";
                document.getElementById("mode-badge").className = "text-[9px] bg-white/10 text-white/70 px-2 py-0.5 rounded-full font-medium tracking-wider";
                document.getElementById("balance-title").innerText = "本月收支結餘 (唯讀)";
                document.getElementById("chart-title").innerText = "支出分類比例";
                document.getElementById("history-title").innerText = "📑 當月即時流水帳 (唯讀)";
                document.getElementById("tab-title-2").innerText = "進階維護";
                document.getElementById("manage-box-title").innerText = "🛠️ 個人記帳進階維護控制台";
                document.getElementById("user-name").innerText = globalProfile.displayName;
            }
            if (globalProfile.pictureUrl) document.getElementById("user-avatar").style.backgroundImage = `url('${globalProfile.pictureUrl}')`;
            const now = new Date();
            document.getElementById("filter-start").value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
            document.getElementById("filter-end").value = now.toISOString().split('T')[0];
            document.getElementById("confirm-gateway").remove();
            loadHomeDashboard();
        }

        window.switchPage = function(pageTarget) {
            const homePage = document.getElementById("page-home"); const managePage = document.getElementById("page-manage");
            const btnHome = document.getElementById("btn-nav-home"); const btnManage = document.getElementById("btn-nav-manage");
            if (pageTarget === 'home') {
                homePage.classList.remove("hidden"); managePage.classList.add("hidden");
                btnHome.className = "flex flex-col items-center justify-center gap-1 transition text-white font-semibold";
                btnManage.className = "flex flex-col items-center justify-center gap-1 transition text-white/40";
                loadHomeDashboard();
            } else {
                homePage.classList.add("hidden"); managePage.classList.remove("hidden");
                btnHome.className = "flex flex-col items-center justify-center gap-1 transition text-white/40";
                btnManage.className = "flex flex-col items-center justify-center gap-1 transition text-white font-semibold";
                queryManagedData();
            }
        }

        async function loadHomeDashboard() {
            try {
                const now = new Date(); const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const rootCollection = isGroupModeSelected ? "groups" : "users";
                const expensesRef = collection(db, rootCollection, finalTargetId, "expenses");
                const q = query(expensesRef, where("timestamp", ">=", startOfMonth), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                let incomeTotal = 0, expenseTotal = 0;
                let chartDataMap = {}; 
                let listHtml = "";

                if (querySnapshot.empty) {
                    document.getElementById("home-history-list").innerHTML = `<div class="text-center py-6 text-white/20 text-xs">當月尚無任何數據。</div>`;
                    renderHomeChart({}); document.getElementById("home-net-balance").innerText = "$0"; return;
                }

                querySnapshot.forEach((res) => {
                    const data = res.data(); const amt = data.amount || 0;
                    const type = data.type || "expense"; const item = data.item || "未命名";
                    const cat = data.category || "生活雜費"; const payer = data.created_by_name || "未知";
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    if (type === "income") incomeTotal += amt;
                    else {
                        expenseTotal += amt;
                        if (isGroupModeSelected) { chartDataMap[payer] = (chartDataMap[payer] || 0) + amt; } 
                        else { chartDataMap[cat] = (chartDataMap[cat] || 0) + amt; }
                    }

                    listHtml += `
                        <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-full ${type==='income' ? 'bg-white text-[#0A1128] font-bold' : 'bg-white/10 border border-white/5 text-white/80'} text-[11px] flex items-center justify-center">${type==='income'?'入':'支'}</div>
                                <div class="flex flex-col">
                                    <span class="font-medium text-white/90 tracking-wide">${item} <span class="text-[9px] text-white/30 font-normal">${isGroupModeSelected ? 'by '+payer : ''}</span></span>
                                    <span class="text-[10px] text-white/40 mt-0.5">${cat}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-bold font-mono ${type==='income' ? 'text-white' : 'text-white/60'}">${type==='income'?'+':'-'} $${amt.toLocaleString()}</span>
                                <span class="text-white/30 block text-[9px] mt-0.5">${dateStr}</span>
                            </div>
                        </div>`;
                });

                if (isGroupModeSelected) {
                    document.getElementById("home-net-balance").innerText = `$${expenseTotal.toLocaleString()}`;
                    document.getElementById("home-totals-row").classList.add("hidden"); 
                } else {
                    document.getElementById("home-totals-row").classList.remove("hidden");
                    document.getElementById("home-total-income").innerText = `+$${incomeTotal.toLocaleString()}`;
                    document.getElementById("home-total-expense").innerText = `-$${expenseTotal.toLocaleString()}`;
                    const net = incomeTotal - expenseTotal;
                    document.getElementById("home-net-balance").innerText = `${net >= 0 ? '' : '-'}$$${Math.abs(net).toLocaleString()}`;
                }
                document.getElementById("home-history-list").innerHTML = listHtml;
                renderHomeChart(chartDataMap);
            } catch (e) { console.error(e); }
        }

        window.queryManagedData = async function() {
            const startVal = document.getElementById("filter-start").value;
            const endVal = document.getElementById("filter-end").value;
            if (!startVal || !endVal) return;

            const loadingTxt = document.getElementById("manage-loading-text");
            const manageList = document.getElementById("manage-history-list");
            loadingTxt.classList.remove("hidden"); manageList.innerHTML = "";

            try {
                const startDate = new Date(startVal + "T00:00:00"); const endDate = new Date(endVal + "T23:59:59");
                const rootCollection = isGroupModeSelected ? "groups" : "users";
                const subCollection = isGroupModeSelected ? "settlements" : "expenses"; 
                
                const expensesRef = collection(db, rootCollection, finalTargetId, subCollection);
                const q = query(expensesRef, where("timestamp", ">=", startDate), where("timestamp", "<=", endDate), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                loadingTxt.classList.add("hidden");
                let listHtml = "";

                if (querySnapshot.empty) {
                    manageList.innerHTML = `<div class="text-center py-12 text-white/20 text-xs">此區間內查無任何紀錄。</div>`; return;
                }

                querySnapshot.forEach((res) => {
                    const id = res.id; const data = res.data(); const amt = data.amount || 0;
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    if (isGroupModeSelected) {
                        const payer = data.payer_name || "未知"; const receiver = data.receiver_name || "未知";
                        listHtml += `
                            <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full bg-emerald-500/20 text-emerald-400 font-bold text-[11px] flex items-center justify-center">平</div>
                                    <div class="flex flex-col">
                                        <span class="font-medium text-white/90 tracking-wide">${payer} ➡️ 還給 ${receiver}</span>
                                        <span class="text-[10px] text-white/30 mt-0.5 font-mono">${dateStr}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-bold font-mono text-emerald-400">$${amt.toLocaleString()}</span>
                                    <button onclick="deleteSettle('${id}')" class="w-7 h-7 rounded-lg text-rose-400/40 hover:text-rose-400 hover:bg-rose-500/10 transition flex items-center justify-center text-xs">🗑️</button>
                                </div>
                            </div>`;
                    } else {
                        const type = data.type || "expense"; const item = data.item || "未命名"; const cat = data.category || "生活雜費";
                        listHtml += `
                            <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full ${type==='income'?'bg-white text-[#0A1128] font-bold':'bg-white/10 text-white/80'} text-[11px] flex items-center justify-center">${type==='income'?'入':'支'}</div>
                                    <div class="flex flex-col">
                                        <span class="font-medium text-white/90 tracking-wide">${item}</span>
                                        <span class="text-[10px] text-white/30 mt-0.5 font-mono">${dateStr} ｜ ${cat}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-bold font-mono">${type==='income'?'+':'-'} $${amt.toLocaleString()}</span>
                                    <div class="flex items-center gap-1 pl-1 border-l border-white/5">
                                        <button onclick="editRecord('${id}', '${item}', ${amt})" class="w-7 h-7 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition flex items-center justify-center text-xs">✎</button>
                                        <button onclick="deleteRecord('${id}', '${item}')" class="w-7 h-7 rounded-lg text-rose-400/40 hover:text-rose-400 hover:bg-rose-500/10 transition flex items-center justify-center text-xs">🗑️</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });

                manageList.innerHTML = listHtml;
            } catch (e) { console.error(e); loadingTxt.classList.add("hidden"); }
        }

        window.editRecord = async function(docId, currentItem, currentAmount) {
            const newItem = prompt("請輸入修正後的項目名稱:", currentItem); if (!newItem) return;
            const newAmountStr = prompt("請輸入修正後的金額:", currentAmount); if (!newAmountStr) return;
            const newAmount = parseInt(newAmountStr, 10); if (isNaN(newAmount) || newAmount <= 0) return;
            try { await updateDoc(doc(db, "users", finalTargetId, "expenses", docId), { item: newItem.trim(), amount: newAmount }); queryManagedData(); } catch (e) {}
        }
        window.deleteRecord = async function(docId, itemTitle) {
            if (confirm(`⚠️ 確定要徹底刪除個人紀錄「${itemTitle}」嗎？`)) {
                try { await deleteDoc(doc(db, "users", finalTargetId, "expenses", docId)); queryManagedData(); } catch (e) {}
            }
        }

        window.deleteSettle = async function(docId) {
            if (confirm(`⚠️ 確定要刪除這筆核銷對帳紀錄嗎？（刪除後該平帳算式將失效）`)) {
                try { await deleteDoc(doc(db, "groups", finalTargetId, "settlements", docId)); queryManagedData(); } catch (e) {}
            }
        }

        function renderHomeChart(chartDataMap) {
            const canvasElement = document.getElementById('homeExpenseChart'); if (!canvasElement) return;
            const ctx = canvasElement.getContext('2d'); const labels = Object.keys(chartDataMap); const dataValues = Object.values(chartDataMap);
            if (homeChart) { homeChart.destroy(); homeChart = null; }
            if (labels.length === 0) { ctx.clearRect(0, 0, canvasElement.width, canvasElement.height); return; }

            homeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: dataValues, backgroundColor: ['#FFFFFF', '#34D399', '#60A5FA', '#FBBF24', '#F87171', '#A78BFA'], borderWidth: 2, borderColor: '#1C2541' }]
                },
                options: {
                    responsive: true,
