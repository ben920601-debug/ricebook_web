<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 記帳米粒 ｜ 記帳小本本專區</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased selection:bg-white/20 pb-24 min-h-screen flex flex-col">

    <div id="login-gateway" class="fixed inset-0 bg-[#0A1128] z-50 flex flex-col items-center justify-center px-6 transition-opacity duration-300">
        <div class="text-center space-y-4">
            <h1 class="text-xl font-bold tracking-widest">✨ 電鍋小幫手安全驗證</h1>
            <p id="gateway-status" class="text-xs text-white/40 tracking-wider">正在對接 LINE 通道...</p>
        </div>
    </div>

    <header class="bg-[#000411]/40 backdrop-blur-md text-white/90 py-4 px-6 border-b border-white/5 sticky top-0 z-40 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <span id="user-avatar" class="w-6 h-6 rounded-full bg-white/10 bg-cover bg-center"></span>
            <span id="user-name" class="text-xs font-bold tracking-wider">載入中...</span>
        </div>
        <span class="text-[9px] text-white/30 tracking-widest uppercase font-semibold">Rice Bookkeeping </span>
    </header>

    <div class="flex-1 w-full mx-auto">
        
        <main id="page-home" class="max-w-md mx-auto px-6 py-6 space-y-6">
            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5 relative overflow-hidden">
                <h2 class="text-[11px] text-white/50 font-medium tracking-widest uppercase">本月收支結餘 (唯讀)</h2>
                <div id="home-net-balance" class="text-3xl font-bold mt-1 tracking-tight font-mono">0</div>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-white/10">
                    <div>
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">Income 總收入</span>
                        <span id="home-total-income" class="text-base font-bold text-white font-mono">+$0</span>
                    </div>
                    <div class="border-l border-white/10 pl-4">
                        <span class="text-[10px] text-white/40 block tracking-wider uppercase">Expense 總支出</span>
                        <span id="home-total-expense" class="text-base font-medium text-white/70 font-mono">-$0</span>
                    </div>
                </div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">收入/支出分類比例圖</h3>
                <div class="w-full max-w-[200px] mx-auto"><canvas id="homeExpenseChart"></canvas></div>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">📑 當月明細 (唯讀)</h3>
                <div id="home-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>

        <main id="page-manage" class="max-w-md mx-auto px-6 py-6 space-y-6 hidden">
            <section class="bg-[#1C2541] rounded-2xl p-5 shadow-xl border border-white/5 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] text-white/40 block tracking-wider uppercase mb-1">起始日期</label>
                        <input type="date" id="filter-start" class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-white/40 block tracking-wider uppercase mb-1">結束日期</label>
                        <input type="date" id="filter-end" class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-white/40 block tracking-wider uppercase mb-1">收支類型</label>
                    <select id="filter-type" class="w-full bg-[#0A1128] border border-white/10 rounded-xl px-3 py-2 text-xs text-white focus:outline-none">
                        <option value="all">全部類型</option>
                        <option value="expense">支出 (Expense)</option>
                        <option value="income">收入 (Income)</option>
                    </select>
                </div>
                <button onclick="queryManagedData()" class="w-full bg-white text-[#0A1128] font-bold text-xs tracking-widest py-3 rounded-xl hover:bg-white/90 transition shadow-md cursor-pointer uppercase">
                    🔍 篩選與檢索數據
                </button>
            </section>

            <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
                <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4">🛠️ 帳目進階維護控制台</h3>
                <div id="manage-loading-text" class="text-center py-8 text-white/30 text-xs tracking-wider hidden">正在檢索資料庫...</div>
                <div id="manage-history-list" class="space-y-4 divide-y divide-white/5"></div>
            </section>
        </main>
        
    </div>

    <footer class="fixed bottom-0 inset-x-0 bg-[#000411]/80 backdrop-blur-lg border-t border-white/5 z-40 pb-safe">
        <div class="max-w-md mx-auto grid grid-cols-2 h-16">
            <button onclick="switchPage('home')" id="btn-nav-home" class="flex flex-col items-center justify-center gap-1 transition text-white">
                <span class="text-base">🏠</span>
                <span class="text-[10px] font-medium tracking-wider">首頁</span>
            </button>
            <button onclick="switchPage('manage')" id="btn-nav-manage" class="flex flex-col items-center justify-center gap-1 transition text-white/40">
                <span class="text-base">📑</span>
                <span class="text-[10px] font-medium tracking-wider">明細查詢</span>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 填入你的網頁端 Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔥 填入你的 LINE LIFF ID
        const MY_LIFF_ID = "2010446205-W1G1WDQQ"; 

        let homeChart = null;
        let globalUserId = null;
        
        // 🚀 群組分流核心變數
        let urlGroupId = null;
        let isGroupMode = false;
        let currentTargetId = null; // 用來存目前到底要撈哪個 document 節點

        // 初始化安全通道
        async function initLIFF() {
            try {
                // 🕵️ 1. 優先解析網址列有沒有帶 ?groupId=xxxx
                const urlParams = new URLSearchParams(window.location.search);
                urlGroupId = urlParams.get('groupId');
                
                if (urlGroupId) {
                    isGroupMode = true;
                    currentTargetId = urlGroupId;
                    document.getElementById("mode-badge").innerText = "👥 群組公帳";
                    document.getElementById("mode-badge").className = "text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-medium tracking-wider";
                    document.getElementById("balance-title").innerText = "本月群組總結餘 (唯讀)";
                    document.getElementById("history-title").innerText = "📑 本月群組即時流水帳 (唯讀)";
                }

                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const profile = await liff.getProfile();
                globalUserId = profile.userId; 

                // 如果是個人模式，主鍵就是自己的真實 LINE UID
                if (!isGroupMode) {
                    currentTargetId = globalUserId;
                    document.getElementById("user-name").innerText = profile.displayName;
                } else {
                    document.getElementById("user-name").innerText = `${profile.displayName} (群組成員)`;
                }

                if (profile.pictureUrl) {
                    document.getElementById("user-avatar").style.backgroundImage = `url('${profile.pictureUrl}')`;
                }

                const now = new Date();
                document.getElementById("filter-start").value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
                document.getElementById("filter-end").value = now.toISOString().split('T')[0];

                const gateway = document.getElementById("login-gateway");
                gateway.classList.add("opacity-0");
                setTimeout(() => gateway.remove(), 300);

                loadHomeDashboard();
            } catch (error) {
                console.error("LIFF 卡死:", error);
                document.getElementById("gateway-status").innerText = "❌ LINE 安全對接失敗，請在 LINE 內打開。";
            }
        }

        // 🔀 底部切換分頁
        window.switchPage = function(pageTarget) {
            const homePage = document.getElementById("page-home");
            const managePage = document.getElementById("page-manage");
            const btnHome = document.getElementById("btn-nav-home");
            const btnManage = document.getElementById("btn-nav-manage");

            if (pageTarget === 'home') {
                homePage.classList.remove("hidden");
                managePage.classList.add("hidden");
                btnHome.className = "flex flex-col items-center justify-center gap-1 transition text-white font-semibold";
                btnManage.className = "flex flex-col items-center justify-center gap-1 transition text-white/40";
                loadHomeDashboard();
            } else {
                homePage.classList.add("hidden");
                managePage.classList.remove("hidden");
                btnHome.className = "flex flex-col items-center justify-center gap-1 transition text-white/40";
                btnManage.className = "flex flex-col items-center justify-center gap-1 transition text-white font-semibold";
                queryManagedData();
            }
        }

        // 🏠 渲染分頁一 (自動相容個人 / 群組路徑)
        async function loadHomeDashboard() {
            try {
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                // 🎯 核心分流路徑選擇器
                const rootCollection = isGroupMode ? "groups" : "users";
                const expensesRef = collection(db, rootCollection, currentTargetId, "expenses");
                
                const q = query(expensesRef, where("timestamp", ">=", startOfMonth), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                let incomeTotal = 0, expenseTotal = 0;
                let categoryData = {};
                let listHtml = "";

                if (querySnapshot.empty) {
                    document.getElementById("home-history-list").innerHTML = `<div class="text-center py-6 text-white/20 text-xs">本月帳本尚無數據。</div>`;
                    renderHomeChart({});
                    updateHomeTotals(0, 0, 0);
                    return;
                }

                querySnapshot.forEach((res) => {
                    const data = res.data();
                    const amt = data.amount || 0;
                    const type = data.type || "expense";
                    const item = data.item || "未命名";
                    const cat = data.category || "生活雜費";
                    
                    // 👥 群組公帳特有：把記帳者名字印出來
                    const creatorName = data.created_by_name ? `by ${data.created_by_name}` : '';
                    
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    const isIncome = type === "income";
                    if (isIncome) incomeTotal += amt;
                    else { expenseTotal += amt; categoryData[cat] = (categoryData[cat] || 0) + amt; }

                    listHtml += `
                        <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-full ${isIncome ? 'bg-white text-[#0A1128] font-bold' : 'bg-white/10 text-white/80 border border-white/5'} text-[11px] flex items-center justify-center">${isIncome ? '入' : '支'}</div>
                                <div class="flex flex-col">
                                    <span class="font-medium text-white/90 tracking-wide">${item} <span class="text-[9px] text-white/30 font-normal">${creatorName}</span></span>
                                    <span class="text-[10px] text-white/40 mt-0.5">${cat}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="font-bold font-mono ${isIncome ? 'text-white' : 'text-white/60'}">${isIncome ? '+' : '-'} $${amt.toLocaleString()}</span>
                                <span class="text-white/30 block text-[9px] mt-0.5">${dateStr}</span>
                            </div>
                        </div>`;
                });

                updateHomeTotals(incomeTotal, expenseTotal, incomeTotal - expenseTotal);
                document.getElementById("home-history-list").innerHTML = listHtml;
                renderHomeChart(categoryData);
            } catch (e) { console.error(e); }
        }

        function updateHomeTotals(inc, exp, net) {
            document.getElementById("home-total-income").innerText = `+$${inc.toLocaleString()}`;
            document.getElementById("home-total-expense").innerText = `-$${exp.toLocaleString()}`;
            document.getElementById("home-net-balance").innerText = `${net >= 0 ? '' : '-'}$$${Math.abs(net).toLocaleString()}`;
        }

        // ⚙️ 渲染分頁二 (自動相容個人 / 群組歷史區間檢索與增刪改)
        window.queryManagedData = async function() {
            const startVal = document.getElementById("filter-start").value;
            const endVal = document.getElementById("filter-end").value;
            const typeVal = document.getElementById("filter-type").value;

            const loadingTxt = document.getElementById("manage-loading-text");
            const manageList = document.getElementById("manage-history-list");
            
            loadingTxt.classList.remove("hidden");
            manageList.innerHTML = "";

            try {
                const startDate = new Date(startVal + "T00:00:00");
                const endDate = new Date(endVal + "T23:59:59");

                const rootCollection = isGroupMode ? "groups" : "users";
                const expensesRef = collection(db, rootCollection, currentTargetId, "expenses");
                
                let q = query(expensesRef, where("timestamp", ">=", startDate), where("timestamp", "<=", endDate), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                loadingTxt.classList.add("hidden");
                let listHtml = "";

                if (querySnapshot.empty) {
                    manageList.innerHTML = `<div class="text-center py-12 text-white/20 text-xs tracking-wider">查無任何收支紀錄。</div>`;
                    return;
                }

                querySnapshot.forEach((res) => {
                    const id = res.id;
                    const data = res.data();
                    const amt = data.amount || 0;
                    const type = data.type || "expense";
                    const item = data.item || "未命名";
                    const cat = data.category || "生活雜費";
                    const creatorName = data.created_by_name ? `[${data.created_by_name}]` : '';
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    if (typeVal !== "all" && type !== typeVal) return;

                    const isIncome = type === "income";
                    listHtml += `
                        <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                            <div class="flex items-center gap-3">
                                <div class="w-7 h-7 rounded-full ${isIncome ? 'bg-white text-[#0A1128] font-bold' : 'bg-white/10 text-white/80 border border-white/5'} text-[11px] flex items-center justify-center">${isIncome ? '入' : '支'}</div>
                                <div class="flex flex-col">
                                    <span class="font-medium text-white/90 tracking-wide">${item} <span class="text-[9px] text-white/30">${creatorName}</span></span>
                                    <span class="text-[10px] text-white/30 mt-0.5 font-mono">${dateStr} ｜ ${cat}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="font-bold font-mono ${isIncome ? 'text-white' : 'text-white/60'}">${isIncome ? '+' : '-'} $${amt.toLocaleString()}</span>
                                <div class="flex items-center gap-1 pl-1 border-l border-white/5">
                                    <button onclick="editRecord('${id}', '${item}', ${amt})" class="w-7 h-7 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition flex items-center justify-center text-xs">✎</button>
                                    <button onclick="deleteRecord('${id}', '${item}')" class="w-7 h-7 rounded-lg text-rose-400/40 hover:text-rose-400 hover:bg-rose-500/10 transition flex items-center justify-center text-xs">🗑️</button>
                                </div>
                            </div>
                        </div>`;
                });

                manageList.innerHTML = listHtml ? listHtml : `<div class="text-center py-12 text-white/20 text-xs">無符合項目。</div>`;
            } catch (e) {
                loadingTxt.classList.add("hidden");
                manageList.innerHTML = `<div class="text-center py-6 text-rose-400/50 text-xs">檢索失敗，請至 Firebase 補上群組 expenses 複合索引。</div>`;
            }
        }

        // 🛠️ 編輯與刪除 (路徑全面相容雙模式)
        window.editRecord = async function(docId, currentItem, currentAmount) {
            const newItem = prompt("請輸入修正後的項目名稱:", currentItem);
            if (!newItem) return;
            const newAmountStr = prompt("請輸入修正後的金額:", currentAmount);
            if (!newAmountStr) return;
            const newAmount = parseInt(newAmountStr, 10);
            if (isNaN(newAmount) || newAmount <= 0) { alert("金額錯誤"); return; }

            try {
                const rootCollection = isGroupMode ? "groups" : "users";
                const docRef = doc(db, rootCollection, currentTargetId, "expenses", docId);
                await updateDoc(docRef, { item: newItem.trim(), amount: newAmount });
                queryManagedData();
            } catch (e) { alert("修改失敗"); }
        }

        window.deleteRecord = async function(docId, itemTitle) {
            if (confirm(`⚠️ 確定要徹底刪除「${itemTitle}」嗎？`)) {
                try {
                    const rootCollection = isGroupMode ? "groups" : "users";
                    const docRef = doc(db, rootCollection, currentTargetId, "expenses", docId);
                    await deleteDoc(docRef);
                    queryManagedData();
                } catch (e) { alert("刪除失敗"); }
            }
        }

        function renderHomeChart(categoryData) {
            const canvasElement = document.getElementById('homeExpenseChart');
            if (!canvasElement) return;
            const ctx = canvasElement.getContext('2d'); 
            const labels = Object.keys(categoryData);
            const dataValues = Object.values(categoryData);

            if (homeChart) { homeChart.destroy(); homeChart = null; }
            if (labels.length === 0) { ctx.clearRect(0, 0, canvasElement.width, canvasElement.height); return; }

            homeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: ['#FFFFFF', '#E2E8F0', '#94A3B8', '#475569', '#334155', '#1E293B'],
                        borderWidth: 2, borderColor: '#1C2541'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 6, padding: 8, font: { size: 9 }, color: 'rgba(255, 255, 255, 0.4)' } } },
                    cutout: '75%'
                }
            });
        }

        initLIFF();
    </script>
</body>
</html>
