<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯糰小幫手 ｜ 行動財務後台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-[#0A1128] text-white font-sans antialiased pb-12 selection:bg-white/20">

    <header class="bg-[#000411]/60 backdrop-blur-md text-white/90 text-center py-4.5 font-medium text-sm tracking-widest uppercase border-b border-white/5 sticky top-0 z-50 flex items-center justify-center gap-2">
        <span id="user-avatar" class="w-5 h-5 rounded-full bg-white/10 hidden bg-cover bg-center"></span>
        <span id="nav-title">RICE COOKER TECH ｜ 雲端帳本</span>
    </header>

    <div id="login-gateway" class="fixed inset-0 bg-[#0A1128] z-50 flex flex-col items-center justify-center px-6 transition-opacity duration-300">
        <div class="text-center space-y-4">
            <h1 class="text-xl font-bold tracking-widest">✨ 飯糰小幫手安全驗證</h1>
            <p id="gateway-status" class="text-xs text-white/40 tracking-wider">正在安全對接 LINE 安全通道...</p>
        </div>
    </div>

    <main class="max-w-md mx-auto px-6 mt-6 space-y-6">

        <section class="bg-[#1C2541] rounded-2xl p-6 text-white shadow-xl relative overflow-hidden border border-white/5">
            <h2 class="text-[11px] text-white/50 font-medium tracking-widest uppercase">本月結餘總覽</h2>
            <div id="net-balance" class="text-3xl font-bold mt-1 tracking-tight font-mono">$0</div>
            
            <div class="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-white/10">
                <div>
                    <span class="text-[10px] text-white/40 block tracking-wider uppercase">Income 總收入</span>
                    <span id="total-income" class="text-base font-bold text-white font-mono">+$0</span>
                </div>
                <div class="border-l border-white/10 pl-4">
                    <span class="text-[10px] text-white/40 block tracking-wider uppercase">Expense 總支出</span>
                    <span id="total-expense" class="text-base font-medium text-white/70 font-mono">-$0</span>
                </div>
            </div>
        </section>

        <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
            <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-4 flex items-center gap-2">
                <span class="w-1 h-1 rounded-full bg-white"></span>
                支出分類比例
            </h3>
            <div class="w-full max-w-[240px] mx-auto my-2">
                <canvas id="expenseChart"></canvas>
            </div>
        </section>

        <section class="bg-[#1C2541] rounded-2xl p-6 shadow-xl border border-white/5">
            <h3 class="text-[11px] font-bold text-white/50 tracking-widest uppercase mb-2">📑 本月收支明細</h3>
            <div id="loading-text" class="text-center py-8 text-white/30 text-xs tracking-wider">雲端數據同步中...</div>
            <div id="history-list" class="space-y-4 divide-y divide-white/5"></div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🚀 1. 填入你原有的網頁端 Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCqTPnsxv_hOJkR0BnsKjQWgLvlQ3GR9E0",
          authDomain: "ricemoney-db.firebaseapp.com",
          projectId: "ricemoney-db",
          storageBucket: "ricemoney-db.firebasestorage.app",
          messagingSenderId: "114147437445",
          appId: "1:114147437445:web:3b6dde2873baf6fb3232ec",
          measurementId: "G-55SFYJSG6D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🚀 2. 填入你在 LINE Developers 申請到的 LIFF ID
        const MY_LIFF_ID = "2010446205-W1G1WDQQ"; 

        let myChart = null;

        // 🚀 3. 自動身份安全對接機制
        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                // 如果沒登入，強制跳轉 LINE 授權登入
                if (!liff.isLoggedIn()) {
                    document.getElementById("gateway-status").innerText = "🔑 正在引導至 LINE 安全登入...";
                    liff.login();
                    return;
                }

                // 成功登入，獲取真實的使用者 Profile
                const profile = await liff.getProfile();
                const currentUserId = profile.userId; // 🎯 拿到使用者獨一無二的 LINE UID

                // 渲染 UI 上的個人資訊
                document.getElementById("nav-title").innerText = `${profile.displayName} ｜ 雲端帳本`;
                if (profile.pictureUrl) {
                    const avatar = document.getElementById("user-avatar");
                    avatar.style.backgroundImage = `url('${profile.pictureUrl}')`;
                    avatar.classList.remove("hidden");
                }

                // 關閉遮罩，解鎖網頁
                const gateway = document.getElementById("login-gateway");
                gateway.classList.add("opacity-0");
                setTimeout(() => gateway.remove(), 300);

                // 🚀 根據使用者的專屬 UID 去 Firebase 隔離拉取資料
                loadDashboardData(currentUserId);

            } catch (error) {
                console.error("LIFF 初始化失敗:", error);
                document.getElementById("gateway-status").innerText = "❌ LINE 安全對接失敗，請在 LINE 內打開此網頁。";
            }
        }

        async function loadDashboardData(userId) {
            try {
                const now = new Date();
                const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

                // 🎯 這裡實現完全隔離：只撈取此 UID 底下的記帳紀錄
                const expensesRef = collection(db, "users", userId, "expenses");
                const q = query(expensesRef, where("timestamp", ">=", startOfMonth), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);

                let incomeTotal = 0;
                let expenseTotal = 0;
                let categoryData = {};
                let listHtml = "";

                document.getElementById("loading-text").classList.add("hidden");

                if (querySnapshot.empty) {
                    document.getElementById("history-list").innerHTML = `<div class="text-center py-8 text-white/30 text-xs tracking-wider">本月帳本尚無任何數據。</div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data(); 
                    const amt = data.amount || 0;
                    const type = data.type || "expense";
                    const item = data.item || "未命名";
                    const cat = data.category || "生活雜費";
                    
                    const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                    const dateStr = `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;

                    if (type === "income") {
                        incomeTotal += amt;
                        listHtml += `
                            <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full bg-white text-[#0A1128] font-bold text-[11px] flex items-center justify-center">入</div>
                                    <div class="flex flex-col">
                                        <span class="font-medium text-white tracking-wide">${item}</span>
                                        <span class="text-[10px] text-white/40 mt-0.5">${cat}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="font-bold text-white font-mono">+ $${amt.toLocaleString()}</span>
                                    <span class="text-white/30 block text-[9px] mt-0.5">${dateStr}</span>
                                </div>
                            </div>`;
                    } else {
                        expenseTotal += amt; 
                        categoryData[cat] = (categoryData[cat] || 0) + amt;
                        listHtml += `
                            <div class="flex justify-between items-center pt-4 text-sm first:pt-0">
                                <div class="flex items-center gap-3">
                                    <div class="w-7 h-7 rounded-full bg-white/10 text-white/80 font-medium text-[11px] flex items-center justify-center border border-white/5">支</div>
                                    <div class="flex flex-col">
                                        <span class="font-medium text-white/90 tracking-wide">${item}</span>
                                        <span class="text-[10px] text-white/40 mt-0.5">${cat}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="font-medium text-white/60 font-mono">- $${amt.toLocaleString()}</span>
                                    <span class="text-white/30 block text-[9px] mt-0.5">${dateStr}</span>
                                </div>
                            </div>`;
                    }
                });

                document.getElementById("total-income").innerText = `+$${incomeTotal.toLocaleString()}`;
                document.getElementById("total-expense").innerText = `-$${expenseTotal.toLocaleString()}`;
                const net = incomeTotal - expenseTotal;
                document.getElementById("net-balance").innerText = `${net >= 0 ? '' : '-'}$$${Math.abs(net).toLocaleString()}`;
                document.getElementById("history-list").innerHTML = listHtml;

                renderChart(categoryData);

            } catch (error) {
                console.error("讀取資料失敗:", error);
                document.getElementById("loading-text").innerText = "❌ 資料載入異常。";
            }
        }

        function renderChart(categoryData) {
            const canvasElement = document.getElementById('expenseChart');
            if (!canvasElement) return;
            
            const ctx = canvasElement.getContext('2d'); 
            const labels = Object.keys(categoryData);
            const dataValues = Object.values(categoryData);

            if (labels.length === 0) {
                canvasElement.parentElement.innerHTML = `<div class="text-center py-6 text-white/20 text-xs tracking-wider">暫無支出分類統計</div>`;
                return;
            }

            if (myChart) { myChart.destroy(); }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: ['#FFFFFF', '#E2E8F0', '#94A3B8', '#475569', '#334155', '#1E293B'],
                        borderWidth: 2,
                        borderColor: '#1C2541'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 8, padding: 12, font: { size: 10 }, color: 'rgba(255, 255, 255, 0.5)' }
                        }
                    },
                    cutout: '75%'
                }
            });
        }

        // 啟動安全性初始化
        initLIFF();
    </script>
</body>
</html>
</html>
